        <span>Workout Tracker</span>
      </div>
        <nav>
          <button class="day-btn active" data-day="monday">Monday</button>
          <button class="day-btn" data-day="tuesday">Tuesday</button>
          <button class="day-btn" data-day="wednesday">Wednesday</button>
          <button class="day-btn" data-day="thursday">Thursday</button>
          <button class="day-btn" data-day="friday">Friday</button>
        </nav>
        <div id="day-tracker">
          <hr class="sidebar-divider" />

          <div class="tracker-month">
            <span class="month-label">Month 1</span>
            <div class="tracker-week-labels">
              <span>M</span>
              <span>T</span>
              <span>W</span>
              <span>T</span>
              <span>F</span>
            </div>
            <div class="tracker-week"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"></div>
            <div class="tracker-week"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"></div>
            <div class="tracker-week"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"></div>
            <div class="tracker-week"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"></div>
          </div>

          <div class="tracker-month">
            <span class="month-label">Month 2</span>
            <div class="tracker-week-labels">
              <span>M</span>
              <span>T</span>
              <span>W</span>
              <span>T</span>
              <span>F</span>
            </div>
            <div class="tracker-week"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"></div>
            <div class="tracker-week"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"></div>
            <div class="tracker-week"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"></div>
            <div class="tracker-week"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"></div>
          </div>

          <div class="tracker-month">
            <span class="month-label">Month 3</span>
            <div class="tracker-week-labels">
              <span>M</span>
              <span>T</span>
              <span>W</span>
              <span>T</span>
              <span>F</span>
            </div>
            <div class="tracker-week"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"></div>
            <div class="tracker-week"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"></div>
            <div class="tracker-week"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"></div>
            <div class="tracker-week"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"><input type="checkbox"></div>
          </div>

          <button id="clear-tracker-btn">Clear Day Tracker</button>
        </div>
      </aside>

      <!-- Main content -->
      <main id="main">
        <span id="day-prefix">Monday - </span><span id="day-subtitle" title="Click to edit">Push</span>

        <table id="workout-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Exercise</th>
              <th>Sets</th>
              <th>Reps</th>
              <th>Weight</th> 
              <th>Notes</th>
            </tr>
          </thead>
          <tbody>
            <!-- 6 rows -->
            <tr>
              <td>1</td>
              <td><input type="text" placeholder="Exercise" /></td>
              <td><input type="number" placeholder="Sets" /></td>
              <td><input type="number" placeholder="Reps" /></td>
              <td><input type="text" placeholder="Lbs." /></td>
              <td><input type="text" placeholder="Notes" /></td>
            </tr>
            <tr>
              <td>2</td>
              <td><input type="text" placeholder="Exercise" /></td>
              <td><input type="number" placeholder="Sets" /></td>
              <td><input type="number" placeholder="Reps" /></td>
              <td><input type="text" placeholder="Lbs." /></td>
              <td><input type="text" placeholder="Notes" /></td>
            </tr>
            <tr>
              <td>3</td>
              <td><input type="text" placeholder="Exercise" /></td>
              <td><input type="number" placeholder="Sets" /></td>
              <td><input type="number" placeholder="Reps" /></td>
              <td><input type="text" placeholder="Lbs." /></td>
              <td><input type="text" placeholder="Notes" /></td>
            </tr>
            <tr>
              <td>4</td>
              <td><input type="text" placeholder="Exercise" /></td>
              <td><input type="number" placeholder="Sets" /></td>
              <td><input type="number" placeholder="Reps" /></td>
              <td><input type="text" placeholder="Lbs." /></td>
              <td><input type="text" placeholder="Notes" /></td>
            </tr>
            <tr>
              <td>5</td>
              <td><input type="text" placeholder="Exercise" /></td>
              <td><input type="number" placeholder="Sets" /></td>
              <td><input type="number" placeholder="Reps" /></td>
              <td><input type="text" placeholder="Lbs." /></td>
              <td><input type="text" placeholder="Notes" /></td>
            </tr>
            <tr>
              <td>6</td>
              <td><input type="text" placeholder="Exercise" /></td>
              <td><input type="number" placeholder="Sets" /></td>
              <td><input type="number" placeholder="Reps" /></td>
              <td><input type="text" placeholder="Lbs." /></td>
              <td><input type="text" placeholder="Notes" /></td>
            </tr>
          </tbody>
        </table>

        <!-- Action buttons -->
        <div id="actions">
          <button id="clear-btn">Clear Table 🧹</button>
        </div>
      </main>

    </div>

    <!-- Clear confirmation modal -->
    <div id="modal" class="hidden">
      <div id="modal-box">
        <p>Are you sure you want to clear this table?</p>
        <div>
          <button id="confirm-btn">Confirm</button>
          <button id="cancel-btn">Cancel</button>
        </div>
      </div>
    </div>

    <div id="tracker-modal" class="hidden">
      <div id="tracker-modal-box">
        <p>Are you sure you want to clear the day tracker?</p>
        <div>
          <button id="confirm-tracker-btn">Confirm</button>
          <button id="cancel-tracker-btn">Cancel</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
